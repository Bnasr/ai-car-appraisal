<!DOCTYPE html>
<html>
<head>
  <title>AI Car Appraisal</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    #chat {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      height: 400px;
      overflow-y: auto;
    }
    .msg {
      margin: 10px 0;
    }
    .ai {
      color: blue;
    }
    .user {
      color: green;
      text-align: right;
    }
    #inputArea {
      max-width: 600px;
      margin: 10px auto;
      display: flex;
    }
    input {
      flex: 1;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<div id="chat">
  <div class="msg ai">
    Hey—happy to help. Are you looking to get a general idea of your car’s value, or compare a trade-in offer?
  </div>
</div>

<div id="inputArea">
  <input id="input" placeholder="Type here..." />
  <button onclick="send()">Send</button>
</div>

<script>
let step = 0;
let car = {};

function send() {
  let input = document.getElementById("input").value;
  if (!input) return;

  let chat = document.getElementById("chat");

  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = input;
  chat.appendChild(userMsg);

  let aiMsg = document.createElement("div");
  aiMsg.className = "msg ai";

  if (step === 0) {
    aiMsg.innerText = "Got it—what’s the year, make, and model?";
    step++;
  } 
  else if (step === 1) {
    car.details = input;
    aiMsg.innerText = "About how many miles are on it?";
    step++;
  } 
  else if (step === 2) {
    car.miles = input;
    aiMsg.innerText = "How would you describe the condition? Clean, average, or needs work?";
    step++;
  } 
  else if (step === 3) {
    car.condition = input;
    aiMsg.innerText = "Any warning lights or known mechanical issues?";
    step++;
  } 
  else if (step === 4) {
    car.mechanical = input;

    let valueLow = 20000;
    let valueHigh = 24000;

    aiMsg.innerText =
      "Based on what you told me, a realistic trade range would be around $" +
      valueLow + " - $" + valueHigh + ".\n\nThis assumes typical mechanical condition.";

    step++;
  } 
  else if (step === 5) {
    aiMsg.innerText =
      "If you want, you can upload a few photos and I’ll tighten that range.\n\n" +
      "Or if you’re thinking about selling, I can help you see what kind of offers this might generate.";
  }

  chat.appendChild(aiMsg);

  document.getElementById("input").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>

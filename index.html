<!DOCTYPE html>
<html>
<head>
  <title>AI Car Appraisal</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    #chat {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      height: 400px;
      overflow-y: auto;
    }
    .msg {
      margin: 10px 0;
    }
    .ai {
      color: blue;
    }
    .user {
      color: green;
      text-align: right;
    }
    #inputArea {
      max-width: 600px;
      margin: 10px auto;
      display: flex;
    }
    input {
      flex: 1;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<div id="chat">
  <div class="msg ai">
    Hey—happy to help. Are you looking to get a general idea of your car’s value, or compare a trade-in offer?
  </div>
</div>

<div id="inputArea">
  <input id="input" placeholder="Type here..." />
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let input = document.getElementById("input").value;

  if (!input) return;

  let chat = document.getElementById("chat");

  // User message
  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = input;
  chat.appendChild(userMsg);

  // AI response (basic for now)
  let aiMsg = document.createElement("div");
  aiMsg.className = "msg ai";

  if (input.toLowerCase().includes("offer")) {
    aiMsg.innerText = "Got it—what’s the vehicle and what were you offered?";
  } else {
    aiMsg.innerText = "Got it—tell me the year, make, and model.";
  }

  chat.appendChild(aiMsg);

  // Clear input
  document.getElementById("input").value = "";

  // Auto scroll
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>

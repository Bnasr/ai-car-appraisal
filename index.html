<h1>NEW VERSION TEST</h1>
<!DOCTYPE html>
<html>
<body>

<h2>Test</h2>

<input id="input">
<button onclick="test()">Send</button>

<div id="output"></div>

<script>
<script>
let step = 0;

function send() {
  let inputBox = document.getElementById("input");
  let input = inputBox.value;
  if (!input) return;

  let chat = document.getElementById("chat");

  // show user message
  chat.innerHTML += "<div><b>You:</b> " + input + "</div>";

  let reply = "";

  if (step === 0) {
    reply = "Got it—what’s the year, make, and model?";
    step = 1;
  } 
  else if (step === 1) {
    reply = "Nice—about how many miles are on it?";
    step = 2;
  } 
  else if (step === 2) {
    reply = "How would you describe the condition? Clean, average, or needs work?";
    step = 3;
  } 
  else if (step === 3) {
    reply = "Any warning lights or mechanical issues?";
    step = 4;
  } 
  else if (step === 4) {
    reply = "Based on what you’re describing, a realistic trade range would be around $20,000 – $24,000.\n\nThis assumes typical mechanical condition.";
    step = 5;
  } 
  else if (step === 5) {
    reply = "If you want, I can help you explore what kind of offers this might generate—totally up to you.";
    step = 6;
  }

  // show AI reply
  chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

  inputBox.value = "";
}
</script>

<!DOCTYPE html>
<html>
<body>

<h2>Test Chat</h2>

<div id="chat"></div>

<input id="input">
<button onclick="send()">Send</button>

<script>
let step = 0;

function send() {
  let input = document.getElementById("input").value;
  let chat = document.getElementById("chat");

  chat.innerHTML += "<div>You: " + input + "</div>";

  let reply = "";

  if (step === 0) {
    reply = "What car do you have?";
    step = 1;
  } else if (step === 1) {
    reply = "How many miles?";
    step = 2;
  } else {
    reply = "Working!";
  }

  chat.innerHTML += "<div>AI: " + reply + "</div>";
}
</script>

</body>
</html>

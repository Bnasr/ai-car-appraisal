<!DOCTYPE html>
<html>
<head>
  <title>AI Car Appraisal</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    #chat {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      height: 400px;
      overflow-y: auto;
    }
    .msg { margin: 10px 0; }
    .ai { color: blue; }
    .user { color: green; text-align: right; }

    #inputArea {
      max-width: 600px;
      margin: 10px auto;
      display: flex;
    }
    input { flex: 1; padding: 10px; }
    button { padding: 10px; }
  </style>
</head>

<body>

<div id="chat">
  <div class="msg ai">
    Hey—happy to help. Are you looking to get a general idea of your car’s value, or compare a trade-in offer?
  </div>
</div>

<div id="inputArea">
  <input id="input" placeholder="Type here..." />
  <button onclick="send()">Send</button>
</div>

<script>
let step = 0;
let car = {};
let lead = {};

function send() {
  let input = document.getElementById("input").value;
  if (!input) return;

  let chat = document.getElementById("chat");

  // user message
  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = input;
  chat.appendChild(userMsg);

  let aiMsg = document.createElement("div");
  aiMsg.className = "msg ai";

  // FIXED FLOW
  if (step === 0) {
    aiMsg.innerText = "Got it—what’s the year, make, and model?";
    step = 1;
  } 
  else if (step === 1) {
    car.details = input;
    aiMsg.innerText = "About how many miles are on it?";
    step = 2;
  } 
  else if (step === 2) {
    car.miles = input;
    aiMsg.innerText = "How would you describe the condition? Clean, average, or needs work?";
    step = 3;
  } 
  else if (step === 3) {
    car.condition = input;
    aiMsg.innerText = "Any warning lights or known mechanical issues?";
    step = 4;
  } 
  else if (step === 4) {
    car.mechanical = input;

    // Basic pricing logic
let basePrice = 30000;

// Adjust for mileage
let miles = parseInt(car.miles) || 0;
let mileageAdjustment = (miles - 40000) * -0.10;

// Adjust for condition
let conditionAdj = 0;
if (car.condition.toLowerCase().includes("clean")) conditionAdj = 1500;
if (car.condition.toLowerCase().includes("average")) conditionAdj = 0;
if (car.condition.toLowerCase().includes("work")) conditionAdj = -2000;

// Adjust for mechanical
let mechAdj = 0;
if (car.mechanical.toLowerCase().includes("yes")) mechAdj = -3000;

// Final value
let value = basePrice + mileageAdjustment + conditionAdj + mechAdj;

let valueLow = Math.round(value - 1000);
let valueHigh = Math.round(value + 1000);

    aiMsg.innerText =
      "Based on what you told me, a realistic trade range would be around $" +
      valueLow + " - $" + valueHigh +
      ".\n\nThis assumes typical mechanical condition.";

    step = 5;
  } 
  else if (step === 5) {
  aiMsg.innerText =
    "If you’d like, I can help you explore what kind of offers this might generate. Just let me know.";
  step = 6;
}

// Lead capture
else if (step === 6) {
  if (input.toLowerCase().includes("yes")) {
    aiMsg.innerText = "Great—what’s your name?";
    step = 7;
  } else {
    aiMsg.innerText = "No problem—feel free to come back anytime.";
  }
}
else if (step === 7) {
  lead.name = input;
  aiMsg.innerText = "What’s the best phone number to reach you?";
  step = 8;
}
else if (step === 8) {
  lead.phone = input;
  aiMsg.innerText = "And your email?";
  step = 9;
}
else if (step === 9) {
  lead.email = input;

  aiMsg.innerText =
    "Perfect—someone will reach out shortly with more details on what your vehicle could bring.";

  console.log("NEW LEAD:", lead, car);
}
    aiMsg.innerText =
      "If you want, you can upload photos for a more precise range, or explore what offers this might generate.";
  }

  chat.appendChild(aiMsg);

  document.getElementById("input").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>

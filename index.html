<!DOCTYPE html>
<html>
<head>
  <title>AI Car Appraisal</title>
</head>

<body>

<h2>AI Car Appraisal</h2>

<div id="chat"></div>

<input id="input" type="text" />
<button onclick="send()">Send</button>

<script>
let step = 0;

function send() {
  let inputBox = document.getElementById("input");
  let input = inputBox.value;

  if (!input) return;

  let chat = document.getElementById("chat");

  // show user message
  chat.innerHTML += "<div><b>You:</b> " + input + "</div>";

  let reply = "";

  if (step === 0) {
    reply = "What’s the year, make, and model?";
    step = 1;
  } 
  else if (step === 1) {
    reply = "How many miles?";
    step = 2;
  } 
  else if (step === 2) {
    reply = "Condition? (clean / average / needs work)";
    step = 3;
  } 
  else if (step === 3) {
    reply = "Any mechanical issues? (yes/no)";
    step = 4;
  } 
  else if (step === 4) {
    reply = "Estimated trade range: $20,000 - $24,000";
    step = 5;
  } 
  else if (step === 5) {
    reply = "Want to explore offers? (yes/no)";
    step = 6;
  } 
  else if (step === 6) {
    if (input.toLowerCase() === "yes") {
      reply = "What’s your name?";
      step = 7;
    } else {
      reply = "No problem!";
    }
  } 
  else if (step === 7) {
    reply = "Phone number?";
    step = 8;
  } 
  else if (step === 8) {
    reply = "Email?";
    step = 9;
  } 
  else if (step === 9) {
    reply = "Thanks! A dealer will contact you.";
  }

  // show AI reply
  chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

  // clear input
  inputBox.value = "";
}
</script>

</body>
</html>

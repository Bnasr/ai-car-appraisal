<!DOCTYPE html>
<html>
<head>
  <title>AI Car Appraisal</title>
</head>

<body>

<h2>AI Car Appraisal</h2>

<div id="chat"></div>

<input id="input" type="text" />
<button onclick="send()">Send</button>

<script>
let step = 0;
let car = {};

function send() {
  let inputBox = document.getElementById("input");
  let input = inputBox.value;

  if (!input) return;

  let chat = document.getElementById("chat");

  // show user message
  chat.innerHTML += "<div><b>You:</b> " + input + "</div>";

  let reply = "";

  if (step === 0) {
    reply = "What’s the year, make, and model?";
    step = 1;
  } 
  else if (step === 1) {
    car.details = input;
    reply = "How many miles?";
    step = 2;
  } 
  else if (step === 2) {
    car.miles = input;
    reply = "Condition? (clean / average / needs work)";
    step = 3;
  } 
  else if (step === 3) {
    car.condition = input.toLowerCase();
    reply = "Any mechanical issues? (yes/no)";
    step = 4;
  } 
  else if (step === 4) {
    car.mechanical = input.toLowerCase();

    let basePrice = 30000;

    let miles = parseInt(car.miles) || 0;
    let mileageAdj = (miles - 40000) * -0.1;

    let conditionAdj = 0;
    if (car.condition.includes("clean")) conditionAdj = 1500;
    if (car.condition.includes("average")) conditionAdj = 0;
    if (car.condition.includes("work")) conditionAdj = -2500;

    let mechAdj = 0;
    if (car.mechanical.includes("yes") || car.mechanical.includes("light")) mechAdj = -3000;

    let value = basePrice + mileageAdj + conditionAdj + mechAdj;

    let low = Math.round(value - 1000);
    let high = Math.round(value + 1000);

    reply = "Based on what you described, a more realistic trade range would be around $" 
            + low + " - $" + high;

    step = 5;
  } 
  else if (step === 5) {
    reply = "Want to explore offers? (yes/no)";
    step = 6;
  } 
  else if (step === 6) {
    if (input.toLowerCase() === "yes") {
      reply = "What’s your name?";
      step = 7;
    } else {
      reply = "No problem!";
    }
  } 
  else if (step === 7) {
    reply = "Phone number?";
    step = 8;
  } 
  else if (step === 8) {
    reply = "Email?";
    step = 9;
  } 
  else if (step === 9) {
    reply = "Thanks! A dealer will contact you.";
  }

  chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

  inputBox.value = "";
}
</script>

</body>
</html>
